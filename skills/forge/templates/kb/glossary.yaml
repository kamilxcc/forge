# meta/glossary.yaml
# 术语表 — 每次会话始终加载
# 这是知识库中价值密度最高的文件：几百 tokens 干掉 80% AI 幻觉
#
# 维护原则：
#   - 只记录产品术语与代码命名不一致的映射
#   - 记录已废弃的旧命名（防止 Agent 用错）
#   - 不记录命名一致的类（Agent 直接 Grep 即可）
#
# 冷启动方法：团队头脑风暴"你们的黑话有哪些"，每人贡献 10 条，去重合并，1-2h 搞定

